name: Deploy Game
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Pygbag
        run: |
          python -m pip install --upgrade pip
          pip install pygbag
      - name: Build Web Version
        run: |
          # 这一行非常关键：告诉 pygbag 就在当前文件夹找 main.py
          python3 -m pygbag --build $GITHUB_WORKSPACE/main.py
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
